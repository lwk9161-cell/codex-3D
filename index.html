<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>新能源能流拓扑 3D 大屏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
      }
    </script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="bootHint" class="boot-hint" hidden>
      3D 引擎加载失败，请检查网络或刷新页面（Cmd/Ctrl + Shift + R）。
    </div>
    <div class="app-shell">
      <aside class="left-panel glass">
        <h2>运行概览</h2>
        <div class="left-metrics">
          <div class="stat-pill">
            <span>总发电量</span>
            <strong id="totalPower">428.7 kWh</strong>
          </div>
          <div class="stat-pill">
            <span>系统效率</span>
            <strong id="systemEfficiency">96.4%</strong>
          </div>
        </div>
        <ul class="status-list">
          <li><span class="dot ok"></span>拓扑同步：正常</li>
          <li><span class="dot ok"></span>逆变器状态：在线</li>
          <li><span class="dot warn"></span>风速波动：中等</li>
          <li><span class="dot ok"></span>储能充放电：自动</li>
        </ul>

        <h3>交互提示</h3>
        <p class="tip">
          鼠标左键拖拽可前后左右平移视图（固定俯瞰高度）；悬停设备显示浮层信息。
        </p>
      </aside>

      <aside class="flow-legend-card glass">
        <h3>能流图例</h3>
        <div class="legend">
          <div><span class="line dc"></span>直流能流</div>
          <div><span class="line ac"></span>交流能流</div>
          <div><span class="line storage"></span>储能充/放电</div>
        </div>
      </aside>

      <main class="stage-wrap">
        <canvas id="stage"></canvas>
        <div id="hoverCard" class="hover-card" hidden>
          <p class="hover-title" id="hoverName">逆变器</p>
          <p class="hover-desc" id="hoverDesc">将直流电转换为交流电并回传至升压站。</p>
          <div class="hover-metrics">
            <span><i>输入</i><b id="hoverIn">10.96 kW</b></span>
            <span><i>输出</i><b id="hoverOut">10.90 kW</b></span>
            <span><i>温度</i><b id="hoverTemp">41.2°C</b></span>
            <span><i>健康度</i><b id="hoverHealth">98%</b></span>
          </div>
        </div>
      </main>
    </div>

    <script>
      window.__energy3DBooted = false;
      setTimeout(() => {
        if (!window.__energy3DBooted) {
          const hint = document.getElementById("bootHint");
          if (hint) hint.hidden = false;
        }
      }, 4000);
    </script>
    <script type="module" src="./app.js?v=23"></script>
  </body>
</html>
